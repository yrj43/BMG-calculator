<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rate Combination Finder</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
<div class="container mt-5">
    <h1 class="text-center mb-4">Rate Combination Finder</h1>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div>
          {% for category, message in messages %}
            <div class="alert alert-{{ 'danger' if category == 'error' else 'info' }}">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}
    <form method="POST" class="card p-4 shadow">
        <div class="mb-3">
            <label for="total_rate" class="form-label">Total Rate</label>
            <input type="text" class="form-control" name="total_rate" required>
        </div>
        <div class="mb-3">
            <label for="min_units" class="form-label">Minimum Units</label>
            <input type="number" class="form-control" name="min_units" required>
        </div>
        <div class="mb-3">
            <label for="rates" class="form-label">Rates (comma-separated)</label>
            <input type="text" class="form-control" name="rates" required>
        </div>
        <button type="submit" class="btn btn-primary">Find Combination</button>
    </form>
    <p class="mt-3">Visitors: {{ visitor_count }} | Clicks: {{ click_count }}</p>
</div>
</body>
</html>
